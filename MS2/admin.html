<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>

  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>🧠 Admin Panel</h2>
  <a href="#">Dashboard</a>
  <a href="#">Marketing</a>
  <a href="#">Products</a>
  <a href="#">Customers</a>
  <a href="#">Reports</a>
</div>

<!-- Main Content -->
<div class="main">

  <h1>Admin Analytics Dashboard</h1>

  <!-- KPI CARDS -->
  <div class="grid">
    <div class="card">💰 Revenue: ₹<span id="rev"></span></div>
    <div class="card">📦 Orders: <span id="orders"></span></div>
    <div class="card">📊 ROAS: <span id="roas"></span></div>
    <div class="card">👥 Customers: <span id="customers"></span></div>
  </div>

  <!-- LINE CHART -->
  <div class="chart-container">
    <h3>Revenue Trend (Last 7 Days)</h3>
    <canvas id="lineChart"></canvas>
  </div>

  <!-- BAR CHART -->
  <div class="chart-container">
    <h3>Campaign Performance (ROAS)</h3>
    <canvas id="barChart"></canvas>
  </div>

  <!-- HISTOGRAM -->
  <div class="chart-container">
    <h3>Order Value Distribution</h3>
    <canvas id="histChart"></canvas>
  </div>

  <!-- EXTRA INSIGHTS -->
  <div class="grid">
    <div class="card">
      <h3>📈 Paid vs Organic</h3>
      <canvas id="pieChart"></canvas>
    </div>

    <div class="card">
      <h3>🔥 Top Products</h3>
      <ul id="products"></ul>
    </div>
  </div>

</div>

<script src="js/admin.js"></script>

</body>
</html>
