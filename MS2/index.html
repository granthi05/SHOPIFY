<!DOCTYPE html>
<html>
<head>
  <title>Shopify Data Analyzer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow-xl w-96">
  <h2 class="text-2xl font-bold mb-4">Login</h2>

  <input id="email" placeholder="Email" class="w-full p-2 border mb-3">
  <input id="password" type="password" placeholder="Password" class="w-full p-2 border mb-3">

  <button onclick="login()" class="bg-green-500 text-white w-full py-2 rounded">
    Login
  </button>
</div>

<script>
async function login() {
    const res = await fetch('http://127.0.0.1:5000/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            email: email.value,
            password: password.value
        })
    });

    const data = await res.json();

    if (data.role === 'admin') {
        window.location = 'admin.html';
    } else {
        window.location = 'dashboard.html';
    }
}
</script>

</body>
</html>
